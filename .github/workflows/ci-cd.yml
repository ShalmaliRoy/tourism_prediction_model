name: MLOps CI/CD Pipeline

# \u2500\u2500 Triggers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# \u2500\u2500 Environment variables shared across jobs \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n
env:
  HF_SPACE_REPO: Shalmali85/TourismPrediction
  HF_MODEL_REPO: Shalmali85/TourismPredictionModel
  HF_TOKEN: ${{ secrets.HF_TOKEN }} # Use GitHub secret instead of hardcoded token
  PYTHON_VERSION: "3.9"

jobs:

  # \u2500\u2500 Job 1: Lint & basic checks (runs on every push and PR) \u2500\u2500\u2500\n
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}


  # \u2500\u2500 Job 2: Train model (only on push to main) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n
  train:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training script
        run: python train.py
        # train.py should:
        #   - load/prepare data
        #   - train the model
        #   - save artifact, e.g. tourism_package_prediction_model_v1.joblib

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: tourism_package_prediction_model_v1.joblib

      - name: Push model to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF_PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj="tourism_package_prediction_model_v1.joblib",
              path_in_repo="tourism_package_prediction_model_v1.joblib",
              repo_id=os.environ["HF_MODEL_REPO"],
              repo_type="model",
          )
          print("Model pushed to Hugging Face Hub.")
          EOF_PYTHON
        # Note: env vars set under  for a step aren't auto-substituted
        # into ${{ }} expressions inside heredocs, so HF_MODEL_REPO is read
        # from the job-level SHELL=/bin/bash
