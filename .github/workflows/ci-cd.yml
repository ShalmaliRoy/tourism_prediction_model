name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HF_SPACE_REPO: Shalmali85/TourismPrediction
  HF_MODEL_REPO: Shalmali85/TourismPredictionModel
  PYTHON_VERSION: "3.9"

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

  train:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

    #  - name: Run training script
    #    run: python train.py

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: tourism_package_prediction_model_v1.joblib

      - name: Push model to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO: ${{ env.HF_MODEL_REPO }}
        run: |
          python - <<'EOF_PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj="tourism_package_prediction_model_v1.joblib",
              path_in_repo="tourism_package_prediction_model_v1.joblib",
              repo_id=os.environ["HF_MODEL_REPO"],
              repo_type="model",
          )
          print("Model pushed to Hugging Face Hub.")
          EOF_PYTHON

  deploy:
    needs: train
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push app files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ env.HF_SPACE_REPO }}
        run: |
          python - <<'EOF_PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_SPACE_REPO"]

          api.upload_folder(
              folder_path="./tourism",
              repo_id=repo_id,
              repo_type="space",
              path_in_repo="tourism",
          )
          print(f"Pushed ./tourism to {repo_id}")
          EOF_PYTHON

      - name: Trigger Space restart (factory reboot)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ env.HF_SPACE_REPO }}
        run: |
          python - <<'EOF_PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.restart_space(repo_id=os.environ["HF_SPACE_REPO"], factory_reboot=True)
          print("Space restart triggered.")
          EOF_PYTHON
