  # \u2500\u2500 Job 3: Deploy app to Hugging Face Space \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n
  deploy:
    needs: train
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push app files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ env.HF_SPACE_REPO }}
        run: |
          python - <<'EOF_PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_SPACE_REPO"]

          # Push the files needed for the Space (app, deps, Dockerfile)

          api.upload_folder(
          folder_path="/tourism",     # the local folder containing your files
          repo_id="Shalmali85/TourismPrediction",          # the target repo
          repo_type="space",                      # dataset, model, or space
          path_in_repo="/tourism/"                          # optional: subfolder path inside the repo
)
              print(f"Pushed {f} to {repo_id}")
          EOF_PYTHON

      - name: Trigger Space restart (factory reboot)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ env.HF_SPACE_REPO }}
        run: |
          python - <<'EOF_PYTHON'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.restart_space(repo_id=os.environ["HF_SPACE_REPO"], factory_reboot=True)
          print("Space restart triggered.")
          EOF_PYTHON
